name: Deprecate npm version

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to deprecate (e.g. 0.1.0)"
        required: true
        type: string
      message:
        description: "Deprecation message"
        required: true
        type: string

jobs:
  deprecate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm deprecate "create-lemon-agent@${{ inputs.version }}" "${{ inputs.message }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
