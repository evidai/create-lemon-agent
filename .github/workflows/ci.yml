name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Run scaffold
        run: |
          chmod +x bin/cli.js
          node bin/cli.js test-scaffold
      - name: Verify generated files
        run: |
          test -f test-scaffold/package.json
          test -f test-scaffold/.gitignore
          test -f test-scaffold/.env.example
          test -f test-scaffold/src/index.ts
          test -f test-scaffold/tsconfig.json
          ! test -f test-scaffold/_gitignore
          grep -q '"name": "test-scaffold"' test-scaffold/package.json
      - name: Type-check generated project
        run: |
          cd test-scaffold
          npm install --no-audit --no-fund
          npx tsc --noEmit
