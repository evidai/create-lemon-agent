name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Verify CLI runs
        run: |
          chmod +x bin/cli.js
          node bin/cli.js _smoke_test
          test -f _smoke_test/package.json
          test -f _smoke_test/.gitignore
          test -f _smoke_test/src/index.ts
          rm -rf _smoke_test
      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
